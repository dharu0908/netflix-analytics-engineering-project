name: Netflix Analytics CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate dbt project structure
        run: |
          test -f dbt_project.yml
          test -d models
          test -d snapshots
          test -d macros
          echo "dbt project structure validated"
